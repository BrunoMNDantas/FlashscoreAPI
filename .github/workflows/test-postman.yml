name: Test Railway Development Deployment

on:
  push:
    branches:
      - dev

jobs:
  wait-for-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway Deployment to Complete
        run: |
          for i in {1..30}; do
            echo "Checking Railway Deployment Status..."
            RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.RAILWAY_API_KEY }}" \
              "https://backboard.railway.app/graphql/v2" \
              -H "Content-Type: application/json" \
              --data-raw '{"query":"query { project(id: \"5824a4b7-2bd9-45dd-96a5-188788ca1720\") { deployments(last: 1) { edges { node { status } } } } }"}')

            echo "Raw API Response:"
            echo "$RESPONSE"

            DEPLOY_STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.RAILWAY_API_KEY }}" \
            "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            --data-raw '{"query":"query { project(id: \"5824a4b7-2bd9-45dd-96a5-188788ca1720\") { deployments(last: 1) { edges { node { status } } } } }"}' | jq -r '.data.project.deployments.edges[0].node.status')

            echo "Current Deployment Status: $DEPLOY_STATUS"

            if [[ "$DEPLOY_STATUS" == "SUCCESS" ]]; then
              echo "Deployment completed!"
              exit 0
            fi
            echo "Waiting for deployment to complete... ($i/30)"
            sleep 5
          done
          echo "Deployment did not complete in time!"
          exit 1

  test_dev:
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Newman (Postman CLI)
        run: npm install -g newman

      - name: Run Postman Tests on Development
        run: |
          newman run ./deploy/tests.postman_collection.json \
          -e ./deploy/env.postman_environment.json \
          --reporters cli,junit \
          --reporter-junit-export results.xml

  merge_if_success:
    needs: test_dev
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Merge dev into main
        uses: devmasx/merge-branch@v1.4.0
        with:
          type: now
          from_branch: dev
          target_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}