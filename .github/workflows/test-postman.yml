name: Test Railway Development Deployment

on:
  push:
    branches:
      - dev

jobs:
  wait-for-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Railway Deployment to be Ready
        run: |
          for i in {1..30}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://flashscoreapi-development.up.railway.app/v3/api-docs)
            if [ "$STATUS" -eq 200 ]; then
              echo "API is ready!"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "API did not become ready in time!"
          exit 1

  test_dev:
    needs: wait-for-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Newman (Postman CLI)
        run: npm install -g newman

      - name: Run Postman Tests on Development
        run: |
          newman run ./deploy/tests.postman_collection.json \
          -e ./deploy/env.postman_environment.json \
          --reporters cli,junit \
          --reporter-junit-export results.xml

  merge_if_success:
    needs: test_dev
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Merge dev into main
        uses: devmasx/merge-branch@v1.4.0
        with:
          type: now
          from_branch: dev
          target_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}